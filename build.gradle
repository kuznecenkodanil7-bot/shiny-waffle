
plugins {
    id 'fabric-loom' version '1.2-SNAPSHOT'
    id 'java'
}
group = 'com.example'
version = '1.0.0'
sourceCompatibility = '17'
targetCompatibility = '17'
repositories {
    mavenCentral()
    maven { url 'https://maven.fabricmc.net/' }
}
dependencies {
    minecraft "com.mojang:minecraft:1.21.11"
    mappings "net.fabricmc:yarn:1.21.11+build.1:v2"
    modImplementation "net.fabricmc:fabric-loader:0.17.8"
    modImplementation "net.fabricmc.fabric-api:fabric-api:1.98.0+1.21.11"
}
java { withSourcesJar() }
